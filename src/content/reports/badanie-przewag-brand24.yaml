  - type: analysis
    number: "01"
    title: "Bolączki kategorii: AI zamiast ręcznej analizy"
    intro: "Kategoria social listening ma chroniczne problemy: narzędzia zbierają tysiące wzmianek, ale użytkownik sam musi wydobyć wnioski. Konfiguracja trwa tygodnie. Analiza sentymentu jest niedokładna."
    headerIcon: "areas/target-click"
    insightsHeading: "Jak Brand24 rozwiązuje bolączki kategorii?"
    insights:
      - title: "AI zamiast surowych danych"
        description: "Konkurencja daje panele danych. Brand24 daje odpowiedzi. AI Brand Assistant pozwala zadać pytanie w języku naturalnym i dostać gotowy wniosek. AI Insights generuje automatyczne raporty z trendami."
      - title: "Sentyment z 95% skutecznością"
        description: "AI Sentiment Analysis osiąga 95% F1 score na próbie 50 tys. wzmianek. Konkurencja? \"Niedokładny sentyment\" to stały motyw w recenzjach Brandwatch i Meltwater."
      - title: "Konfiguracja w minuty"
        description: "Ocena łatwości obsługi: 4,7/5 na bazie 250+ recenzji. Brandwatch wymaga dedykowanego wdrożenia. Meltwater prowadzi przez demo. Brand24? Wpisujesz słowo kluczowe i zaczynasz."
    comparisonHeading: "Porównanie z konkurencją"
    comparison:
      columns: ["Aspekt", "Brandwatch", "Meltwater", "Brand24"]
      highlightedColumnIndex: 3
      rows:
        - ["Wdrożenie", "Dedykowane wdrożenie", "Guided demo", "Konfiguracja w minuty"]
        - ["Wnioski", "Praca własna", "Panele danych", "AI generuje gotowe"]
        - ["Cennik", "Brak publicznego", "Brak publicznego", "Publiczny"]
        - ["Cena wejścia", "Indywidualna wycena", "Indywidualna wycena", "$199/mies. (rocznie)"]
    risksHeading: "Gdzie leży ryzyko?"
    risks:
      - icon: "control-point-duplicate"
        title: "Kopiowalność"
        body: "Trudna w krótkim terminie. Wymaga połączenia danych (25 mln źródeł), UX, AI osadzonego w przepływie pracy i tempa wydawania nowych wersji. Kopiowalna w średnim terminie przez duże platformy, jeśli uznają segment MŚP za strategiczny."
      - icon: "visibility-lock"
        title: "Ograniczenie kategorii"
        body: "Niedokładny sentyment to systemowa wada całej branży, nie specyficzny problem Brand24. Żadne narzędzie social listening nie rozwiązało tego w pełni. Szum w wynikach występuje u wszystkich graczy."

  - type: analysis
    surface: muted
    number: "02"
    title: "Łamanie schematów: Publiczny cennik w branży, która cennik ukrywa"
    intro: "Brand24 łamie co najmniej 5 niepisanych reguł branży social listening. To najsilniejsza przewaga w całej analizie."
    headerIcon: "areas/eye-scan"
    insightsHeading: "Jak Brand24 łamie schematy?"
    insights:
      - title: "Publikuje ceny, których branża nie pokazuje"
        description: "Brandwatch nie publikuje cennika. Meltwater wymaga rozmowy z handlowcem. Brand24 publikuje cennik na stronie."
      - title: "Daje przetestować produkt bez rozmowy z handlowcem"
        description: "Klient testuje pełny produkt bez kontaktu z handlowcem. W segmencie enterprise to odwrócenie typowego procesu sprzedaży."
      - title: "Zmienia kategorię budżetową: z kosztu na analitykę"
        description: "Brand24 przekształca social listening z wydatku PR-owego w analitykę biznesową. Zmiana kategorii budżetowej w głowie klienta."
    comparisonHeading: "5 złamanych reguł"
    comparison:
      columns: ["Reguła branżowa", "Co robi Brand24"]
      rows:
        - ["Ukryte ceny, indywidualne wyceny", "Publiczny cennik online, od $199/mies."]
        - ["Demo + rozmowa z handlowcem", "14-dniowy trial bez karty kredytowej"]
        - ["Roczne kontrakty", "Subskrypcje miesięczne, bez zobowiązań"]
        - ["Złożoność = wartość", "Prostota i szybkość (4,7/5 na ~500 recenzji)"]
        - ["Sprzedaż relacyjna enterprise", "Samoobsługa dla mniejszych firm"]
    risksHeading: "Gdzie leży ryzyko?"
    risks:
      - icon: "control-point-duplicate"
        title: "Kopiowalność"
        body: "Bardzo trudna dla dominujących graczy (Brandwatch, Meltwater). Obniżenie cen i uproszczenie modelu sprzedaży oznaczałoby kanibalizację marży (klasyczny dylemat innowatora). Dla nowych pretendentów kopiowalna. Mniejsi gracze już to robią."
      - icon: "exclamation"
        title: "Kompromisy modelu"
        bullets:
          - "Niski próg wejścia ($199/mies.), ale zaawansowane filtry wzmianek (Boolean search) dopiero od wyższych planów."
          - "Szybka konfiguracja bez szkoleń, ale dużo filtrów i opcji od razu, bez prowadzenia."
          - "AI generuje wnioski automatycznie, ale nieadekwatne wzmianki nadal wymagają ręcznego filtrowania."

  - type: analysis
    number: "03"
    title: "DNA firmy: Twarz w branży bezosobowych platform"
    intro: "Czasem wyróżnik nie leży w produkcie, ale w tym, kim jest organizacja. Brand24 to przypadek, w którym CEO jest częścią produktu."
    headerIcon: "areas/dna-helix"
    insightsHeading: "Jak Brand24 buduje przewagę z własnej tożsamości?"
    insights:
      - title: "Ma twarz i nazwisko w kategorii bez twarzy"
        description: "Sadowski: 95K+ followersów LinkedIn, wideo \"This is Poland\" z 4M+ wyświetleń, autor bestsellerowej \"Rewolucji Social Media\". Otwarcie publikuje dane operacyjne (MRR, ARPU)."
      - title: "Tłumaczy się wprost, gdy coś idzie nie tak"
        description: "W 2018 Facebook zablokował integrację Brand24. Firma straciła 8% klientów z dnia na dzień. Sadowski wystąpił przed kamerą, tłumacząc sytuację wprost. Otwartość zbudowała obrońców marki."
      - title: "Traktuje support jak element marki"
        description: "Ocena wsparcia na Capterra: 4,8/5. Recenzje wymieniają z imienia konkretne osoby z supportu. Zasada \"ciut za uprzejmi\" to sformalizowana kultura, nie przypadek."
    risksHeading: "Gdzie leży ryzyko?"
    risks:
      - icon: "control-point-duplicate"
        title: "Kopiowalność"
        body: "Osobista marka CEO jest organicznie przypisana do konkretnego człowieka i trudna do skopiowania. Ale DNA firmy nie musi opierać się na jednej osobie. Zespół, który otwarcie pokazuje swoją pracę, dzieli się wiedzą i buduje relacje z rynkiem, może osiągnąć podobny efekt. Wymaga to świadomej strategii, nie przypadku."
      - icon: "exclamation"
        title: "Zagrożenie"
        body: "Efektywne głównie w Polsce. Za granicą (80% przychodów) marketing \"odarty jest z Sadka\" (cytat Sadowskiego). Przejęcie przez Semrush/Adobe dodaje 4 poziomy hierarchii korporacyjnej. Osobista marka CEO jest trudna do utrzymania w strukturze korporacji."

  - type: analysis
    surface: muted
    number: "04"
    title: "Demokratyzacja: Social listening za $199, nie $800+"
    intro: "Social listening był domeną korporacji z budżetami na Brandwatch ($800+/mies.) i dedykowanymi zespołami analitycznymi. Brand24 otworzył tę kategorię na mniejsze firmy."
    headerIcon: "areas/shopping-bag"
    insightsHeading: "Jak Brand24 otwiera kategorię dla mniejszych firm?"
    insights:
      - title: "Sprzedaje za $199 tam, gdzie enterprise woła $800+"
        description: "Od $199/mies. Ponad 50% klientów to firmy do 100 pracowników. Sprout Social kosztuje $199/mies. za jednego użytkownika. Brand24 daje unlimited users od planu Team."
      - title: "Wpuszcza na pokład bez karty i handlowca"
        description: "14-dniowy trial bez karty kredytowej. Brak wymaganej rozmowy z handlowcem. Wystarczy wpisać słowo kluczowe, żeby zacząć monitoring."
      - title: "Zmienia social listening w operacyjne narzędzie MŚP"
        description: "Social listening to już nie \"CI dla Coca-Coli\". To narzędzie operacyjne dla małych biznesów: znajdowanie klientów, monitorowanie konkurencji, reagowanie na kryzysy."
    comparisonHeading: "Porównanie cen"
    comparison:
      columns: ["Narzędzie", "Cena wejścia", "Trial", "Kontakt z handlowcem"]
      rows:
        - ["Brandwatch", "~$800+/mies.", "Brak", "Tak"]
        - ["Meltwater", "~$400–1000+/mies.", "Brak", "Tak"]
        - ["Sprout Social", "$199/mies./user", "30 dni", "Nie"]
        - ["Brand24", "$199/mies.", "14 dni, bez karty", "Nie"]
        - ["Mention", "od $599/mies.", "Brak", "Tak"]
        - ["Awario", "$29–49/mies.", "Tak", "Nie"]
    risksHeading: "Gdzie leży ryzyko?"
    risks:
      - icon: "exclamation"
        title: "Napięcie strategiczne"
        body: "14-dniowy trial bez karty to świadomy ruch: niski próg wejścia pozwala użytkownikowi doświadczyć wartości produktu zanim zapłaci. To buduje retencję (trudniej zrezygnować z czegoś, co już znasz). Kompromis: bez karty na wejściu Brand24 musi potem „ścigać\" o płatność, co wymaga dodatkowych mechanizmów konwersji. Na najniższym planie (2000 wzmianek/mies.) aktywnie dyskutowana firma wyczerpie limit w ciągu dni. Brand24 przesuwa się w stronę enterprise: ARPU rośnie szybciej niż liczba klientów."

  - type: analysis
    number: "05"
    title: "Kombinacje wartości: 11 funkcji w jednym narzędziu"
    intro: "Klienci kupowali osobno: monitoring wzmianek, analitykę sentymentu, raportowanie, influencer tracking, crisis alerting. Brand24 połączył to w jednym produkcie w przystępnej cenie."
    headerIcon: "areas/magic-wand"
    insightsHeading: "Jak Brand24 łączy to, co inni sprzedają osobno?"
    insights:
      - title: "Łamie kompromis \"tanie albo zaawansowane\""
        description: "\"Tanie = uproszczone\" vs \"zaawansowane = drogie\". Zaawansowane funkcje (influencer tracking, AI analytics, crisis detection) przy cenie dostępnej dla MŚP."
      - title: "Zamienia kombinację AI + monitoring w 2,5× ARPU"
        description: "AI spowodowało 2,5-krotny wzrost ARPU na nowych klientach. Empiryczne potwierdzenie, że kombinacja monitoring + AI konwertuje na wyższą monetyzację."
    comparisonHeading: "Co tradycyjnie kupowano osobno"
    comparison:
      columns: ["Kupowano osobno", "Brand24 łączy w jednym"]
      rows:
        - ["Monitoring wzmianek", "25+ mln źródeł: social, news, blogi, podcasty, fora, recenzje"]
        - ["Analiza sentymentu", "AI Sentiment Analysis"]
        - ["Raporty z trendami", "AI Insights (automatyczne raporty)"]
        - ["Q&A o marce", "AI Brand Assistant (pytania w języku naturalnym)"]
        - ["Alerty kryzysowe", "Storm Alerts, push, Slack/Teams"]
        - ["Influencer tracking", "Influence Score, Share of Voice, top profiles"]
    risksHeading: "Gdzie leży ryzyko?"
    risks:
      - icon: "exclamation"
        title: "Trwałość przewagi"
        body: "Poszczególne funkcje są kopiowalne indywidualnie. Okno ekskluzywności: 6–12 miesięcy. Trwała przewaga leży w integracji 11 funkcji w prostym interfejsie za cenę MŚP, nie w liście funkcji samej w sobie."

  - type: analysis
    surface: muted
    number: "06"
    title: "Nowa podkategoria: Co AI mówi o Twojej marce"
    intro: "Brand24 w Polsce przez lata był synonimem „monitoringu mediów społecznościowych\" — marka zdefiniowała kategorię. Ten sam ruch zespół próbuje powtórzyć globalnie z nowym, siostrzanym produktem Chatbeat."
    headerIcon: "areas/robot"
    insightsHeading: "Jak Brand24 definiuje nową kategorię?"
    insights:
      - title: "W Polsce stał się synonimem swojej kategorii"
        description: "Na polskim rynku Brand24 przez lata było synonimem „monitoringu mediów społecznościowych\". Wikipedia polska definiuje monitoring mediów przez pryzmat Brand24. Top keyword na Similarweb: „brand24\" z 26,4K wyszukiwań."
      - title: "Powtarza ruch globalnie przez siostrzany Chatbeat"
        description: "Chatbeat (osobny pakiet, ten sam zespół) monitoruje obecność marki w odpowiedziach ChatGPT, Claude, Gemini, Perplexity. Sadowski: „Monitoring Internetu: słuchasz LUDZI. Monitoring AI: słuchasz MODELI\". 1,1 mln zł ARR po 7 miesiącach, zero wydatków marketingowych."
    comparisonHeading: "Twarde dane Chatbeat (po 7 miesiącach)"
    comparison:
      columns: ["Metryka", "Wartość"]
      rows:
        - ["Klienci", "100+"]
        - ["ARR", "1,1 mln zł (+25% m/m)"]
        - ["Marketing na launch", "Zero"]
        - ["Promocja do bazy Brand24", "Brak aktywnej"]
        - ["Monitorowane LLM", "6+ (ChatGPT, Claude, Gemini, Perplexity, DeepSeek, Grok)"]
    risksHeading: "Gdzie leży ryzyko?"
    risks:
      - icon: "exclamation"
        title: "Kopiowalność"
        body: "Kategoria LLM Listening dopiero się formuje. 6–8 nowych narzędzi w 12 miesięcy (Ahrefs Brand Radar, Meltwater GenAI Lens, Nightwatch). Okno: 12–18 miesięcy. Pytanie: czy Brand24 utrzyma pozycję early movera."

  - type: preview-gate
    headline: "Chcesz zobaczyć jak przewagi łączą się w trudną do skopiowania konstelację?"
    insightLabel: "To dopiero połowa analizy. W pełnej wersji zobaczysz:"
    insightPoints:
      - "5 konstelacji przewag (jak elementy tworzą system)"
      - "Pomysły na wzmocnienie przewag (z narzędzia Advantage Intelligence)"
      - "Ocena strategiczna (co najsilniejsze, co zagrożone, co wzmocnić)"
    cta:
      label: "Odblokuj dostęp"
      href: "#gate"
      note: "Czego możesz się spodziewać? Zostawiając maila zapisujesz się do newslettera. Raz w miesiącu wysyłam krótkiego maila. Najczęściej dzielę się wnioskami z badań w segmencie B2B."

  - type: methodology
    rationaleHeading: "Dlaczego szukamy konstelacji przewag, nie magicznego USP"
    rationaleIntro: "Pojedyncza przewaga jest łatwo kopiowalna, a konkurencja może ją odtworzyć w 6-12 miesięcy. System wzajemnie wzmacniających się elementów jest bardzo trudno skopiować."
    approaches:
      - icon: "approaches/face-neutral"
        tone: neutral
        label: "Typowe podejście"
        description: "Szukasz jednego USP. Jednej rzeczy, która Cię wyróżnia. Problem: jedno USP jest kopiowalne. Konkurencja kopiuje to w 6-12 miesięcy."
      - icon: "approaches/face-happy"
        tone: accent
        label: "Nasze podejście"
