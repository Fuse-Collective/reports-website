title: "Przykładowy raport"
client: "Acme Corp"
description: "Placeholder raport do testowania szablonów sekcji."
sections:
  - type: offer-cards
    as: h1
    headline: "Specjalizujemy się w kompleksowych projektach z dwóch obszarów"
    description: "Pracujemy z liderami lub pretendentami bardzo różnych branż nad rozwiązaniem złożonych problemów brandingowych."
    cards:
      - headline: "Rebranding i odświeżanie wizerunku"
        icon: "rebranding"
        body: "Przeprowadzamy klientów przez skomplikowane <strong>procesy zmiany wizerunku</strong>. Czasem przyjmują one formę ewolucyjnego liftingu, a czasem rewolucyjnego rebrandingu. Doradzamy odpowiedni kierunek tworząc strategię marki, która <strong>przełoży się na skuteczną komunikację oraz autentyczną identyfikacją wizualną.</strong>"
        link:
          label: "Więcej o rebrandingu"
          href: "#rebranding"
      - headline: "Tworzymy nowe marki"
        icon: "nowa-marka"
        body: "Pomagamy klientom od początku <strong>świadomie podejść do budowy marki</strong>, aby dać jej lepszy start. Wspólnie przechodzimy przez proces krystalizowania wizji i strategii. <strong>Definiujemy</strong> o czym ma być marka, oraz jak ma być postrzegana i czym się wyróżnii."
        link:
          label: "Więcej o budowaniu marki"
          href: "#budowa-marki"

  - type: pain-points
    headline: "Obserwujesz u siebie te problemy?"
    body: "Od ponad 15 lat pomagamy firmom w budowaniu silnej marki i spójnej identyfikacji wizualnej."
    items:
      - icon: "wizerunek"
        label: "Przestarzały wizerunek"
      - icon: "niespojna"
        label: "Niespójna komunikacja"
      - icon: "brak-wyroznienia"
        label: "Brak wyróżnienia na tle konkurencji"
      - icon: "brak-wytycznych"
        label: "Brak wytycznych brandingowych"
      - icon: "brak-porzadku"
        label: "Brak porządku w materiałach"
      - icon: "zmiany-strategiczne"
        label: "Zmiany strategiczne wymagające rebrandingu"

  - type: services-grid
    headline: "Klienci wybierają nas i zostają z nami na dłużej"
    body: "Widząc efekty rozumieją, że jesteśmy inni niż agencje, z którymi wcześniej pracowali."
    surface: dark
    services:
      - heading: "Tworzymy strategie marek i doradzamy"
        icon: "strategia"
        description: "Nie musisz znać się na wizerunku, to nasza specjalizacja. Wystarczy, że znasz swój biznes."
      - heading: "Projektujemy identyfikacje wizualne i komunikację"
        icon: "identyfikacja"
        description: "Rozbudowane systemy identyfikacji wizualnej oraz materiały marketingowe to namacalne efekty naszej pracy."
      - heading: "Budujemy systemy komunikacji"
        icon: "komunikacja"
        description: "Odpowiednio dobrane słowa i treści pomagają budować zaufanie oraz w zrozumiały sposób opowiadają o marce."
      - heading: "Dopasowujemy autorski proces do kontekstu"
        icon: "proces"
        description: "Przez 10 lat wypracowaliśmy powtarzalne podejście tworzenia, badania i ulepszania rozwiązań, aby skutecznie realizowały cele biznesowe i wizerunkowe."
      - heading: "Realizujemy złożone projekty dla liderów"
        icon: "lider"
        description: "Pracujemy z liderami lub pretendentami nad złożonymi problemami, lub gdy marka wymaga głębszych zmian."
      - heading: "Dajemy świeże spojrzenie"
        icon: "spojrzenie"
        description: "Synergia doświadczeń z różnych branż zapewnia świeżość, a przywiązanie do detalu wysoką jakość oraz estetykę."

  - type: testimonials
    headline: "Zapytaj naszych klientów dlaczego zostają z nami na dłużej"
    body: "Każdy z naszych klientów miał unikalne wyzwanie. Sprawdź jak je rozwiązaliśmy."
    cta:
      label: "Zapytaj o referencje"
      href: "#referencje"
    testimonials:
      - name: "Tomasz Stefanowski"
        role: "Kierownik ds. rozwoju serwisu www"
        logo: "/images/logos/castorama.svg"
        href: "#"
      - name: "Anna Kowalska"
        role: "Marketing Director"
        logo: "/images/logos/grenevia.svg"
        href: "#"
      - name: "Piotr Nowak"
        role: "Brand Manager"
        logo: "/images/logos/tdj.svg"
        href: "#"

  - type: project-type
    projects:
      - headline: "Chcesz odświeżyć wizerunek?"
        cta:
          label: "Zobacz portfolio"
          href: "#portfolio-rebranding"
        image:
          src: "/images/project-rebranding.jpg"
          alt: "Portfolio rebrandingowe"
      - headline: "Tworzysz nową markę?"
        cta:
          label: "Zobacz portfolio"
          href: "#portfolio-nowa-marka"
        image:
          src: "/images/project-new-brand.jpg"
          alt: "Portfolio nowych marek"

  - type: cta
    headline: "Masz pomysł, ale nie wiesz jak wcielić go w życie? Nie wiesz od czego zacząć?"
    buttons:
      - label: "Porozmawiaj z nami"
        href: "#kontakt"
        variant: "primary"
      - label: "Czytaj poradniki"
        href: "#poradniki"
        variant: "ghost"
